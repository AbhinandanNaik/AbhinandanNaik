<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="100%" height="260">
    <defs>
        <pattern id="grid-tel" width="30" height="30" patternUnits="userSpaceOnUse">
            <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#141923" stroke-width="1"/>
        </pattern>
        <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="glow-pink" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="gradient-title" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00f0ff"/>
            <stop offset="50%" stop-color="#7000ff"/>
            <stop offset="100%" stop-color="#ff007f"/>
        </linearGradient>
        <clipPath id="wave-clip">
            <rect x="21" y="56" width="138" height="38" rx="3"/>
        </clipPath>
    </defs>

    <style><![CDATA[
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Outfit:wght@600;900&display=swap');
        
        .bg { fill: #090a0f; }
        .grid-overlay { fill: url(#grid-tel); }
        
        .title {
            font-family: 'Outfit', system-ui, sans-serif;
            font-weight: 900;
            font-size: 40px;
            fill: url(#gradient-title);
            letter-spacing: 2px;
        }
        .subtitle {
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            fill: #8b949e;
            letter-spacing: 2px;
        }
        .section-hdr {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 13px;
            fill: #ffffff;
            letter-spacing: 1px;
        }
        
        /* Bar chart fonts */
        .bar-label {
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            fill: #8b949e;
        }
        .bar-value {
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            fill: #00f0ff;
            font-weight: bold;
        }
        
        .pill-label {
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            fill: #58a6ff;
        }
        
        @keyframes rotate-hud {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .hud-gear {
            transform-origin: 430px 130px;
            animation: rotate-hud 25s linear infinite;
        }
        
        @keyframes status-blink {
            0%, 100% { fill: #39ff14; filter: drop-shadow(0 0 2px #39ff14); }
            50% { fill: #12161f; filter: none; }
        }
        .status-dot {
            animation: status-blink 2s infinite;
        }

        /* Waveform and Thread grid telemetry animations */
        @keyframes wave-move-1 {
            from { transform: translateX(0px); }
            to { transform: translateX(-120px); }
        }
        @keyframes wave-move-2 {
            from { transform: translateX(0px); }
            to { transform: translateX(120px); }
        }
        .wave-primary {
            animation: wave-move-1 3s linear infinite;
        }
        .wave-secondary {
            animation: wave-move-2 4.5s linear infinite;
        }

        @keyframes core-blink-cyan {
            0%, 100% { fill: #00f0ff; filter: drop-shadow(0 0 1.5px #00f0ff); }
            50% { fill: #141923; filter: none; }
        }
        @keyframes core-blink-pink {
            0%, 100% { fill: #ff007f; filter: drop-shadow(0 0 1.5px #ff007f); }
            40% { fill: #141923; filter: none; }
        }
        @keyframes core-blink-green {
            0%, 100% { fill: #39ff14; filter: drop-shadow(0 0 1.5px #39ff14); }
            60% { fill: #141923; filter: none; }
        }
        @keyframes core-blink-yellow {
            0%, 100% { fill: #ffbd2e; filter: drop-shadow(0 0 1.5px #ffbd2e); }
            70% { fill: #141923; filter: none; }
        }
        .core {
            stroke-width: 0.5;
            stroke: #141923;
        }
        .core-p1 { animation: core-blink-cyan 2s infinite; animation-delay: 0.1s; }
        .core-p2 { animation: core-blink-cyan 3s infinite; animation-delay: 0.7s; }
        .core-s1 { animation: core-blink-pink 2.5s infinite; animation-delay: 0.3s; }
        .core-s2 { animation: core-blink-pink 3.5s infinite; animation-delay: 1.2s; }
        .core-ok { animation: core-blink-green 4s infinite; animation-delay: 0.5s; }
        .core-warn { animation: core-blink-yellow 1.8s infinite; animation-delay: 0.9s; }

        .telemetry-readout {
            font-family: 'Fira Code', monospace;
            font-size: 9px;
            fill: #8b949e;
        }
    ]]></style>

    <rect width="900" height="260" rx="12" class="bg"/>
    <rect width="900" height="260" rx="12" class="grid-overlay"/>

    <!-- Decorative HUD Rotating Rings -->
    <g class="hud-gear" opacity="0.15">
        <circle cx="430" cy="130" r="70" fill="none" stroke="#7000ff" stroke-width="1.5" stroke-dasharray="10 8"/>
        <circle cx="430" cy="130" r="55" fill="none" stroke="#00f0ff" stroke-width="1" stroke-dasharray="4 4"/>
    </g>

    <!-- Left Frame: Developer Credentials -->
    <g transform="translate(60, 65)">
        <path d="M-20 -15 L30 -15 M-20 -15 L-20 30" stroke="#ff007f" stroke-width="2" fill="none" opacity="0.8"/>
        <text x="0" y="20" class="title">ABHINANDAN NAIK</text>
        <text x="0" y="45" class="subtitle">BACKEND ENGINEER // DEVSECOPS PIPELINES</text>
        
        <!-- Live Status Row -->
        <g transform="translate(0, 80)">
            <rect x="0" y="0" width="130" height="24" rx="12" fill="#030508" stroke="#141923" stroke-width="1"/>
            <circle cx="15" cy="12" r="4.5" class="status-dot"/>
            <text x="28" y="16" class="pill-label">PIPELINE: <tspan fill="#39ff14" font-weight="bold">ACTIVE</tspan></text>
            
            <rect x="145" y="0" width="135" height="24" rx="12" fill="#030508" stroke="#141923" stroke-width="1"/>
            <circle cx="160" cy="12" r="4" fill="#00f0ff" filter="url(#glow-cyan)"/>
            <text x="173" y="16" class="pill-label">THEME: <tspan fill="#00f0ff" font-weight="bold">CYBERPUNK</tspan></text>
        </g>
    </g>

    <!-- Right Frame: Real-Time Systems Telemetry (Oscilloscope & Core LED matrix) -->
    <g transform="translate(540, 45)">
        <rect x="0" y="0" width="300" height="170" fill="#030508" stroke="#141923" stroke-width="1.5" rx="8" opacity="0.8"/>
        
        <text x="20" y="25" class="section-hdr">REAL-TIME THREAD FABRIC MONITOR</text>
        
        <!-- Oscilloscope Waveform Monitor -->
        <text x="20" y="46" font-family="'Fira Code', monospace" font-size="8px" fill="#8b949e">OSCILLOSCOPE / CONCURRENT_LOAD</text>
        <rect x="20" y="55" width="140" height="40" fill="#04060a" stroke="#141923" stroke-width="1" rx="4"/>
        
        <g clip-path="url(#wave-clip)" opacity="0.8">
            <!-- Flowing Sine Wave 1 (Cyan) -->
            <path d="M -120 75 Q -90 60 -60 75 T 0 75 T 60 75 T 120 75 T 180 75 T 240 75" fill="none" stroke="#00f0ff" stroke-width="1.5" class="wave-primary" filter="url(#glow-cyan)"/>
            <!-- Flowing Sine Wave 2 (Pink) -->
            <path d="M -120 75 Q -90 90 -60 75 T 0 75 T 60 75 T 120 75 T 180 75 T 240 75" fill="none" stroke="#ff007f" stroke-width="1" class="wave-secondary" filter="url(#glow-pink)"/>
        </g>
        
        <!-- CPU Core Thread Grid (Blinking LEDs) -->
        <text x="180" y="46" font-family="'Fira Code', monospace" font-size="8px" fill="#8b949e">CPU CORES</text>
        
        <g class="core-grid">
            <!-- Row 0 -->
            <rect class="core core-p1" x="180" y="55" width="12" height="8" rx="1.5"/>
            <rect class="core core-p2" x="196" y="55" width="12" height="8" rx="1.5"/>
            <rect class="core core-s1" x="212" y="55" width="12" height="8" rx="1.5"/>
            <rect class="core core-ok" x="228" y="55" width="12" height="8" rx="1.5"/>
            
            <!-- Row 1 -->
            <rect class="core core-ok" x="180" y="69" width="12" height="8" rx="1.5"/>
            <rect class="core core-s2" x="196" y="69" width="12" height="8" rx="1.5"/>
            <rect class="core core-p2" x="212" y="69" width="12" height="8" rx="1.5"/>
            <rect class="core core-s1" x="228" y="69" width="12" height="8" rx="1.5"/>
            
            <!-- Row 2 -->
            <rect class="core core-ok" x="180" y="83" width="12" height="8" rx="1.5"/>
            <rect class="core core-p1" x="196" y="83" width="12" height="8" rx="1.5"/>
            <rect class="core core-ok" x="212" y="83" width="12" height="8" rx="1.5"/>
            <rect class="core core-warn" x="228" y="83" width="12" height="8" rx="1.5"/>
        </g>
        
        <!-- System Status Readings -->
        <g transform="translate(20, 112)" class="telemetry-readout">
            <text x="0" y="10">THREAD_POOL: <tspan fill="#00f0ff" font-weight="bold">ACTIVE</tspan></text>
            <text x="0" y="22">SCHEDULER:   <tspan fill="#39ff14" font-weight="bold">CFS_SCHED</tspan></text>
            <text x="0" y="34">LATENCY_P99: <tspan fill="#ff007f" font-weight="bold">0.82 ms</tspan></text>
            
            <text x="145" y="10">SYS_FREQ: <tspan fill="#ffffff" font-weight="bold">4.92GHz</tspan></text>
            <text x="145" y="22">LOAD_AVG: <tspan fill="#ffbd2e" font-weight="bold">0.42 / 12%</tspan></text>
            <text x="145" y="34">NET_BAND: <tspan fill="#ffffff" font-weight="bold">82.1MB/s</tspan></text>
        </g>
    </g>
</svg>
